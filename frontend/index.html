<!DOCTYPE html>
<html>
<head>
    <title>HireSignal</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            max-width:900px;
            margin:auto;
            padding:20px;
        }

        h1{
            color:navy;
        }

        .box{
            border:1px solid #ddd;
            padding:15px;
            margin-bottom:20px;
            border-radius:8px;
        }

        input{
            width:100%;
            padding:8px;
            margin-top:5px;
            margin-bottom:10px;
        }

        textarea{
            width:100%;
            padding:8px;
            margin-top:5px;
            margin-bottom:10px;
        }

        button{
            padding:10px 15px;
            background:navy;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:darkblue;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:15px;
        }

        th,td{
            border:1px solid #ddd;
            padding:10px;
            text-align:left;
        }

        th{
            background:#f0f0f0;
        }

        .note-box{
            background:#f8f8f8;
            padding:10px;
            margin-top:10px;
            border-radius:6px;
        }
    </style>
</head>

<body>

<h1>HireSignal</h1>

<!-- USER -->

<div class="box">

    <h2>Create User</h2>

    <input id="name" placeholder="Name">

    <input id="email" placeholder="Email">

    <button onclick="createUser()">
        Create User
    </button>

</div>

<!-- APPLICATION -->

<div class="box">

    <h2>Add Application</h2>

    <input id="company" placeholder="Company">

    <input id="role" placeholder="Role">

    <input id="source" placeholder="Source">

    <input id="user_id" placeholder="User ID">

    <button onclick="addApplication()">
        Add Application
    </button>

</div>

<!-- NOTES (MONGODB) -->

<div class="box">

    <h2>Add Research Note (MongoDB)</h2>

    <input id="note_app_id"
           placeholder="Application ID">

    <input id="note_company"
           placeholder="Company Name">

    <textarea id="note_text"
              placeholder="Research Notes"></textarea>

    <input id="note_stack"
           placeholder="Tech Stack">

    <button onclick="saveNote()">
        Save Note
    </button>

</div>

<!-- VIEW APPLICATIONS -->

<div class="box">

    <h2>View Applications</h2>

    <input id="search_user_id"
           placeholder="User ID">

    <button onclick="loadApplications()">
        Load Applications
    </button>

    <div id="results"></div>

</div>

<script>

const PY_API = "http://localhost:3000";
const TS_API = "http://localhost:4000/api";


// =========================
// CREATE USER
// =========================

async function createUser(){

    const response = await fetch(
        PY_API + "/users/",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                name:document.getElementById("name").value,
                email:document.getElementById("email").value
            })
        }
    );

    const data = await response.json();

    alert(JSON.stringify(data,null,2));
}


// =========================
// ADD APPLICATION
// =========================

async function addApplication(){

    const response = await fetch(
        PY_API + "/applications",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                company_name:
                    document.getElementById("company").value,

                role:
                    document.getElementById("role").value,

                source:
                    document.getElementById("source").value,

                user_id:Number(
                    document.getElementById("user_id").value
                )
            })
        }
    );

    const data = await response.json();

    alert(JSON.stringify(data,null,2));
}


// =========================
// SAVE NOTE (MONGODB)
// =========================

async function saveNote(){

    const response = await fetch(
        TS_API + "/notes",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({

                applicationId:Number(
                    document.getElementById(
                        "note_app_id"
                    ).value
                ),

                companyName:
                    document.getElementById(
                        "note_company"
                    ).value,

                researchNotes:
                    document.getElementById(
                        "note_text"
                    ).value,

                techStack:
                    document.getElementById(
                        "note_stack"
                    ).value
            })
        }
    );

    const data = await response.json();

    alert("Note saved to MongoDB!");

    console.log(data);
}


// =========================
// LOAD APPLICATIONS
// =========================

async function loadApplications(){

    const userId =
        document.getElementById(
            "search_user_id"
        ).value;

    const response = await fetch(
        PY_API +
        "/applications?user_id=" +
        userId
    );

    const applications =
        await response.json();

    let html = `
        <table>
            <tr>
                <th>ID</th>
                <th>Company</th>
                <th>Role</th>
                <th>Status</th>
                <th>Notes</th>
            </tr>
    `;

    applications.forEach(app => {

        html += `
            <tr>
                <td>${app.id}</td>

                <td>${app.company_name}</td>

                <td>${app.role}</td>

                <td>${app.status}</td>

                <td>
                    <button
                        onclick="loadNote(${app.id})">
                        Show Notes
                    </button>

                    <div id="note-${app.id}">
                    </div>
                </td>

            </tr>
        `;
    });

    html += "</table>";

    document.getElementById(
        "results"
    ).innerHTML = html;
}


// =========================
// LOAD NOTE FROM MONGODB
// =========================

async function loadNote(applicationId){

    const response = await fetch(
        TS_API +
        "/notes/" +
        applicationId
    );

    const note =
        await response.json();

    const container =
        document.getElementById(
            "note-" + applicationId
        );

    if(note.message){

        container.innerHTML =
            "<p>No note found</p>";

        return;
    }

    container.innerHTML = `
        <div class="note-box">

            <strong>Company:</strong>
            ${note.companyName}<br><br>

            <strong>Research:</strong><br>
            ${note.researchNotes}<br><br>

            <strong>Tech Stack:</strong><br>
            ${note.techStack}

        </div>
    `;
}

</script>

</body>
</html>
